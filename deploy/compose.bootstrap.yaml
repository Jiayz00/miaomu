{
  "name": "miaomu",
  "services": {
    "db": {
      "restart": "no",
      "healthcheck": {
        "test": [
          "CMD",
          "/bin/sh",
          "/usr/local/bin/miaomu-mysql-healthcheck",
          "bootstrap"
        ],
        "interval": "5s",
        "timeout": "5s",
        "retries": 30,
        "start_period": "60s"
      }
    }
  }
}
