{
  "name": "miaomu_restore",
  "services": {
    "app": {
      "restart": "no",
      "volumes": [
        {
          "type": "bind",
          "source": "/etc/miaomu-restore/generated/event.php",
          "target": "/var/www/html/app/event.php",
          "read_only": false,
          "bind": {
            "create_host_path": false
          }
        }
      ]
    }
  }
}
