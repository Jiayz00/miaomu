# Project-local Codex settings. Do not copy to the user-level config.
approval_policy = "never"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
# Repository configuration never opens network access globally. An authorized
# L4 broker run still requires the surrounding Codex session/tool permission.
network_access = false

[features]
hooks = true

[mcp_servers.nursery_harness]
command = "python"
args = ["-u", ".harness/mcp/server.py"]
enabled = true
required = false
supports_parallel_tool_calls = true
startup_timeout_sec = 10
tool_timeout_sec = 20
enabled_tools = ["harness_status", "requirements_search", "requirement_get", "task_get"]

[mcp_servers.nursery_harness.tools.requirement_get]
approval_mode = "approve"

[mcp_servers.nursery_harness.tools.harness_status]
approval_mode = "approve"

[mcp_servers.nursery_harness.tools.task_get]
approval_mode = "approve"
